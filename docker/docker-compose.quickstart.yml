services:
  jasminia:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "${JASMINIA_PORT:-3100}:3100"
    environment:
      HOST: "0.0.0.0"
      JASMINIA_HOME: "/jasminia"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      JASMINIA_DEPLOYMENT_MODE: "authenticated"
      JASMINIA_DEPLOYMENT_EXPOSURE: "private"
      JASMINIA_PUBLIC_URL: "${JASMINIA_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - "${JASMINIA_DATA_DIR:-../data/docker-jasminia}:/jasminia"
