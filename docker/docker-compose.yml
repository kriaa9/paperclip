services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: jasminia
      POSTGRES_PASSWORD: jasminia
      POSTGRES_DB: jasminia
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jasminia -d jasminia"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://jasminia:jasminia@db:5432/jasminia
      PORT: "3100"
      SERVE_UI: "true"
      JASMINIA_DEPLOYMENT_MODE: "authenticated"
      JASMINIA_DEPLOYMENT_EXPOSURE: "private"
      JASMINIA_PUBLIC_URL: "${JASMINIA_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - jasminia-data:/jasminia
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  jasminia-data:
